name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build release zip
        run: |
          ZIP_NAME="tabtabtab-nuke-${{ github.ref_name }}.zip"
          FOLDER_NAME="tabtabtab-nuke-${{ github.ref_name }}"
          mkdir -p "$FOLDER_NAME"
          cp tabtabtab_nuke_core.py tabtabtab_nuke.py menu.py tabtabtab_prefs.py tabtabtab_prefs_dialog.py readme.md "$FOLDER_NAME/"
          zip -r "$ZIP_NAME" "$FOLDER_NAME"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
