name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build release zip
        run: |
          ZIP_NAME="tabtabtab-nuke-${{ github.ref_name }}.zip"
          zip "$ZIP_NAME" \
            tabtabtab_nuke_core.py \
            tabtabtab_nuke.py \
            menu.py \
            tabtabtab_prefs.py \
            tabtabtab_prefs_dialog.py
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
